name: 🚀 Build Sehatak APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 💙 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        cache: true
    
    - name: 🔑 Add google-services.json
      run: |
        cat > android/app/google-services.json << 'JSONEOF'
        {
          "project_info": {
            "project_number": "1053269106596",
            "project_id": "sehatak-platform",
            "storage_bucket": "sehatak-platform.firebasestorage.app"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:1053269106596:android:de2128024cd023a973ab31",
                "android_client_info": {
                  "package_name": "com.sehatak.app"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "AIzaSyD_frsfhn0jde9cWVUW3hXjGcnMIQmY51k"
                }
              ],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }
          ],
          "configuration_version": "1"
        }
        JSONEOF
    
    - name: 📦 Install dependencies
      run: flutter pub get
    
    - name: Add Camera & Audio permissions
      run: |
        cat > android/app/src/main/AndroidManifest.xml << 'MAN'
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.CAMERA"/>
            <uses-permission android:name="android.permission.RECORD_AUDIO"/>
            <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
            <uses-feature android:name="android.hardware.camera" android:required="true"/>
            <uses-feature android:name="android.hardware.camera.autofocus"/>
            <application android:label="صحتك" android:icon="@mipmap/ic_launcher">
                <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                    <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                    <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                </activity>
                <meta-data android:name="flutterEmbedding" android:value="2"/>
            </application>
        </manifest>
        MAN
    
    - name: Add all permissions
      run: |
        cat > android/app/src/main/AndroidManifest.xml << 'MAN'
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.CAMERA"/>
            <uses-permission android:name="android.permission.RECORD_AUDIO"/>
            <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
            <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>
            <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>
            <uses-permission android:name="android.permission.BLUETOOTH"/>
            <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>
            <uses-feature android:name="android.hardware.camera" android:required="false"/>
            <uses-feature android:name="android.hardware.camera.autofocus" android:required="false"/>
            <uses-feature android:name="android.hardware.microphone" android:required="false"/>
            <application android:label="صحتك" android:icon="@mipmap/ic_launcher">
                <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                    <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                    <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                </activity>
                <meta-data android:name="flutterEmbedding" android:value="2"/>
            </application>
        </manifest>
        MAN
    
    - name: 🔨 Build APK
      run: flutter build apk --release --split-per-abi
    
    - name: 📤 Upload arm64-v8a
      uses: actions/upload-artifact@v4
      with:
        name: app-arm64-v8a
        path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
        retention-days: 30
    
    - name: 📤 Upload armeabi-v7a
      uses: actions/upload-artifact@v4
      with:
        name: app-armeabi-v7a
        path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
        retention-days: 30
